<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>

    <title>MyCodeBlog</title>
    <!--CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <header>
        <nav class="navbar fixed-top bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Gabriel Blog</a>
                <a href="/newpost" class="btn btn-primary" role="button">Novo Post</a>
            </div>
        </nav>
    </header>

    <section style="margin-top: 80px;">

        <div class="container" style="width: 60%; padding-bottom: 30px;">

            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item active" aria-current="page">Home</li>
                </ol>
            </nav>

            <div class="card shadow-sm bg-white rounded" style="margin-top: 20px;" th:each="post : ${posts}">
                <div class="card-body">
                    <p class="card-subtitle mb-2 text-muted" style="font-size: 0.8rem;">
                        <span th:text="${post.author}"></span>
                        <span th:text="${post.data}"></span>
                    </p>
                    <a th:href="${(#mvc.url('CC#getPostDetails').arg(0, post.id)).build()}" class="card-link"><h4 class="card-title" style="font-weight: bold; color: black; padding-top: 5px;"><span th:text="${post.title}"></span></h4></a>
                    <p class="card-text"><span th:utext="${#strings.abbreviate(post.text,400)} "></span></p>
                    <!--<a th:href="${(#mvc.url('BC#getPostDetails').arg(0, post.id)).build()}" class="card-link">Acessar</a>-->
                </div>
            </div>

        </div>
    </section>

</body>

</html>
